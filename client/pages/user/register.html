<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - GOALTIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #111827;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-gold: #facc15;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #22c55e 50%, #facc15 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), #2563eb);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        .password-strength {
            height: 4px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .strength-weak { background: #ef4444; width: 33%; }
        .strength-medium { background: #f59e0b; width: 66%; }
        .strength-strong { background: #22c55e; width: 100%; }

        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--accent-blue);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen px-6">
    <!-- Background Elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-20 left-20 w-64 h-64 bg-blue-500 rounded-full opacity-10 blur-3xl floating"></div>
        <div class="absolute bottom-20 right-20 w-96 h-96 bg-green-500 rounded-full opacity-10 blur-3xl floating" style="animation-delay: 1s;"></div>
        <div class="absolute top-1/2 left-1/2 w-80 h-80 bg-yellow-500 rounded-full opacity-10 blur-3xl floating" style="animation-delay: 2s;"></div>
    </div>

    <!-- Register Container -->
    <div class="w-full max-w-md relative z-10">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="flex items-center justify-center space-x-2 mb-4">
                <i class="fas fa-futbol text-4xl text-blue-400"></i>
                <span class="text-3xl font-bold hero-gradient">GOALTIX</span>
            </div>
            <p class="text-gray-400">Bergabung dalam Pengalaman Piala Dunia 2026</p>
        </div>

        <!-- Register Form -->
        <div class="glass-effect rounded-2xl p-8">
            <h2 class="text-2xl font-bold mb-6 text-center">Buat Akun</h2>
            
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Nama Lengkap</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="registerName" required 
                               class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-white" 
                               placeholder="John Doe">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Email</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="email" id="registerEmail" required 
                               class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-white" 
                               placeholder="email@example.com">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="password" id="registerPassword" required 
                               class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-white" 
                               placeholder="Buat password yang kuat"
                               oninput="checkPasswordStrength(this.value)">
                        <button type="button" onclick="togglePassword('register')" 
                                class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-white">
                            <i class="fas fa-eye" id="registerPasswordToggle"></i>
                        </button>
                    </div>
                    <div class="mt-2">
                        <div class="password-strength" id="passwordStrength"></div>
                        <p class="text-xs text-gray-400 mt-1" id="passwordStrengthText">Masukkan password</p>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-gray-300 mb-2">Konfirmasi Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="password" id="confirmPassword" required 
                               class="input-field w-full pl-10 pr-4 py-3 rounded-lg text-white" 
                               placeholder="Ulangi password">
                        <button type="button" onclick="togglePassword('confirm')" 
                                class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-white">
                            <i class="fas fa-eye" id="confirmPasswordToggle"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="flex items-center">
                        <input type="checkbox" id="terms" required class="mr-2 rounded">
                        <span class="text-sm text-gray-300">
                            Saya setuju dengan <a href="#" class="text-blue-400 hover:text-blue-300">Syarat & Ketentuan</a> 
                            dan <a href="#" class="text-blue-400 hover:text-blue-300">Kebijakan Privasi</a>
                        </span>
                    </label>
                </div>

                <button type="submit" id="registerBtn" class="btn-primary w-full mb-4">
                    <i class="fas fa-user-plus mr-2"></i>
                    <span id="registerBtnText">Buat Akun</span>
                </button>

                <div class="text-center mb-6">
                    <p class="text-gray-400">Sudah punya akun?</p>
                    <a href="/login" class="text-blue-400 hover:text-blue-300 transition font-semibold">Login di sini</a>
                </div>

                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-600"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-transparent text-gray-400">Atau daftar dengan</span>
                    </div>
                </div>

                <div class="mt-6 grid grid-cols-2 gap-4">
                    <button type="button" onclick="socialRegister('google')" 
                            class="glass-effect py-3 rounded-lg hover:bg-white hover:bg-opacity-10 transition">
                        <i class="fab fa-google text-red-400"></i>
                        <span class="ml-2">Google</span>
                    </button>
                    <button type="button" onclick="socialRegister('facebook')" 
                            class="glass-effect py-3 rounded-lg hover:bg-white hover:bg-opacity-10 transition">
                        <i class="fab fa-facebook text-blue-400"></i>
                        <span class="ml-2">Facebook</span>
                    </button>
                </div>
            </form>
        </div>

        <!-- Back to Home -->
        <div class="text-center mt-4">
            <a href="/" class="text-gray-400 hover:text-white transition">
                <i class="fas fa-arrow-left mr-2"></i>
                Back to Home
            </a>
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notificationContainer"></div>

    <!-- JavaScript -->
    <script src="/assets/js/app.js"></script>
    <script>
        // Password strength checker
        function checkPasswordStrength(password) {
            const strengthBar = document.getElementById('passwordStrength');
            const strengthText = document.getElementById('passwordStrengthText');
            
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]+/)) strength++;
            if (password.match(/[A-Z]+/)) strength++;
            if (password.match(/[0-9]+/)) strength++;
            if (password.match(/[$@#&!]+/)) strength++;

            strengthBar.className = 'password-strength';
            
            if (password.length === 0) {
                strengthText.textContent = 'Masukkan password';
                strengthBar.style.width = '0';
            } else if (strength < 3) {
                strengthBar.classList.add('strength-weak');
                strengthText.textContent = 'Password lemah';
            } else if (strength < 4) {
                strengthBar.classList.add('strength-medium');
                strengthText.textContent = 'Password sedang';
            } else {
                strengthBar.classList.add('strength-strong');
                strengthText.textContent = 'Password kuat';
            }
        }

        function togglePassword(field) {
            const passwordInput = field === 'register' ? 
                document.getElementById('registerPassword') : 
                document.getElementById('confirmPassword');
            const toggleIcon = field === 'register' ? 
                document.getElementById('registerPasswordToggle') : 
                document.getElementById('confirmPasswordToggle');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            
            // Validation
            if (password !== confirmPassword) {
                app.showNotification('Passwords do not match!', 'error');
                return;
            }
            
            if (password.length < 6) {
                app.showNotification('Password must be at least 6 characters!', 'error');
                return;
            }
            
            if (!terms) {
                app.showNotification('Please accept the terms and conditions!', 'error');
                return;
            }
            
            const registerBtn = document.getElementById('registerBtn');
            const registerBtnText = document.getElementById('registerBtnText');
            
            // Show loading state
            registerBtn.disabled = true;
            registerBtnText.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Creating account...';
            
            try {
                await app.register(name, email, password);
                Swal.fire({
                    icon: 'success',
                    title: 'Registrasi Berhasil!',
                    text: 'Akun Anda telah dibuat. Mengarahkan ke halaman utama...',
                    confirmButtonColor: '#22c55e',
                    timer: 2000,
                    timerProgressBar: true
                });
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Registrasi Gagal',
                    text: error.message || 'Registrasi gagal. Silakan coba lagi.',
                    confirmButtonColor: '#ef4444'
                });
            } finally {
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fas fa-user-plus mr-2"></i>Daftar Sekarang';
            }
        }

        function socialRegister(provider) {
            app.showNotification(`${provider} registration coming soon!`, 'info');
        }

        // Auto-focus name field
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('registerName').focus();
        });
    </script>
</body>
</html>
